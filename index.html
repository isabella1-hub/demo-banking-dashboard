<!DOCTYPE html>
<html>
<head>
  <title>Dashboard - Demo Bank</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="dashboard-container">
    <h2>Welcome to Demo Bank</h2>
<button onclick="logout()" style="float:right;">Logout</button>

    <div class="balance-container">
      <h3>Balance:</h3>
      <p class="balance">$880315</p>
    </div>

    <div class="buttons-container">
      <button class="topup">Top Up</button>
      <button class="receive">Receive</button>
      <button class="more">More</button>
    </div>

    <!-- ===== Send Money Form ===== -->
    <div class="transfer-box">
      <h3>Send Money</h3>

      <input type="text" id="accountNumber" placeholder="Account Number"><br><br>
      <input type="text" id="bankName" placeholder="Bank Name"><br><br>
      <input type="number" id="amount" placeholder="Amount"><br><br>

      <button onclick="sendMoney()">Send</button>
    </div>
  </div>

  <script src="./js/script.js"></script>
</body>
</html>
